name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm turbo run build --filter='./packages/*'

      - name: Typecheck all
        run: pnpm turbo run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build --filter='./packages/*'

      - name: Test
        run: pnpm turbo run test:unit

      - name: Coverage
        if: github.event_name == 'pull_request'
        run: pnpm turbo run test:coverage
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/**'
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: typecheck
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: qcms_test
          POSTGRES_USER: qcms
          POSTGRES_PASSWORD: qcms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qcms -d qcms_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_MASTER_KEY: test-master-key
          MEILI_NO_ANALYTICS: 'true'
        ports:
          - 7700:7700
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://qcms:qcms@localhost:5432/qcms_test
      REDIS_URL: redis://localhost:6379
      MEILI_URL: http://localhost:7700
      MEILI_MASTER_KEY: test-master-key
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: qcms-test
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: 'true'
      JWT_SECRET: test-secret-32-chars-minimum-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - run: pnpm turbo run test:integration
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: '**/coverage/**'
          retention-days: 3

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.42
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run build
      - name: Install Playwright browsers
        run: pnpm --filter @q-cms/admin exec playwright install --with-deps chromium
      - name: Run E2E
        run: pnpm --filter @q-cms/admin test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/admin/playwright-report/
          retention-days: 7

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/q-cms-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Admin
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.admin
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/q-cms-admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/q-cms-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

version: '3.9'

name: q-cms

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

x-restart: &default-restart
  restart: unless-stopped

services:
  # ============================================
  # Application
  # ============================================
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    <<: [*default-restart, *default-logging]
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgres://qcms:${POSTGRES_PASSWORD:-qcms}@postgres:5432/qcms
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-2}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}
      REDIS_URL: redis://redis:6379
      REDIS_DB_CACHE: ${REDIS_DB_CACHE:-0}
      REDIS_DB_QUEUE: ${REDIS_DB_QUEUE:-1}
      REDIS_DB_SESSIONS: ${REDIS_DB_SESSIONS:-2}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: qcms-media
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: 'true'
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-32-chars-min}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-2592000}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-qcms_session}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-600}
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@q-cms.local}
      WEBHOOK_TIMEOUT_MS: ${WEBHOOK_TIMEOUT_MS:-10000}
      WEBHOOK_MAX_ATTEMPTS: ${WEBHOOK_MAX_ATTEMPTS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      DOCS_ENABLED: ${DOCS_ENABLED:-true}
      REGISTRATION_OPEN: ${REGISTRATION_OPEN:-false}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      SUPPORTED_LOCALES: ${SUPPORTED_LOCALES:-en,ru,de}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      meilisearch: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  admin:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin
    <<: [*default-restart, *default-logging]
    ports:
      - '3001:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3000}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_URL:-http://localhost:3001}
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    <<: [*default-restart, *default-logging]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://qcms:${POSTGRES_PASSWORD:-qcms}@postgres:5432/qcms
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-2}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}
      REDIS_URL: redis://redis:6379
      REDIS_DB_CACHE: ${REDIS_DB_CACHE:-0}
      REDIS_DB_QUEUE: ${REDIS_DB_QUEUE:-1}
      REDIS_DB_SESSIONS: ${REDIS_DB_SESSIONS:-2}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: qcms-media
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_FORCE_PATH_STYLE: 'true'
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-32-chars-min}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@q-cms.local}
      WEBHOOK_TIMEOUT_MS: ${WEBHOOK_TIMEOUT_MS:-10000}
      WEBHOOK_MAX_ATTEMPTS: ${WEBHOOK_MAX_ATTEMPTS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      meilisearch: { condition: service_healthy }

  # ============================================
  # Data
  # ============================================
  postgres:
    image: postgres:17-alpine
    <<: [*default-restart, *default-logging]
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: qcms
      POSTGRES_USER: qcms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qcms}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../packages/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - 'postgres'
      - '-c'
      - 'shared_buffers=256MB'
      - '-c'
      - 'max_connections=200'
      - '-c'
      - 'work_mem=64MB'
      - '-c'
      - 'maintenance_work_mem=256MB'
      - '-c'
      - 'random_page_cost=1.1'
      - '-c'
      - 'log_min_duration_statement=200ms'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qcms -d qcms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: [*default-restart, *default-logging]
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'noeviction']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  meilisearch:
    image: getmeili/meilisearch:v1.10
    <<: [*default-restart, *default-logging]
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      MEILI_ENV: ${NODE_ENV:-development}
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    <<: [*default-restart, *default-logging]
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/qcms-media &&
      mc anonymous set download local/qcms-media &&
      echo 'MinIO initialized';
      "
    restart: 'no'

  # ============================================
  # Dev Tools
  # ============================================
  mailhog:
    image: mailhog/mailhog:v1.0.1
    <<: [*default-restart, *default-logging]
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8025/']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:

networks:
  default:
    name: qcms-net
